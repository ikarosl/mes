services:
  mysql:
    image: mysql:8.4
    command: --default-time-zone=+08:00
    environment:
      MYSQL_DATABASE: company_mes_next
      MYSQL_USER: mes
      MYSQL_PASSWORD: change-me
      MYSQL_ROOT_PASSWORD: change-root-me
    ports: ['3306:3306']
    volumes: ['mysql-data:/var/lib/mysql']
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1']
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7-alpine
    profiles: ['optional']
    ports: ['6379:6379']
  minio:
    image: minio/minio
    profiles: ['optional']
    command: server /data --console-address :9001
    environment: { MINIO_ROOT_USER: change-me, MINIO_ROOT_PASSWORD: change-me-now }
    ports: ['9000:9000', '9001:9001']
volumes:
  mysql-data:
