name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
  migration-fresh:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          {
            MYSQL_DATABASE: company_mes_next,
            MYSQL_USER: mes,
            MYSQL_PASSWORD: mes-test,
            MYSQL_ROOT_PASSWORD: root-test,
          }
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping -h 127.0.0.1" --health-interval=5s --health-timeout=3s --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
        env:
          {
            DB_HOST: 127.0.0.1,
            DB_PORT: 3306,
            DB_USER: mes,
            DB_PASSWORD: mes-test,
            DB_NAME: company_mes_next,
            DB_CONNECTION_LIMIT: 5,
          }
